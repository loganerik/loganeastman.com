{{ define "main" }}
<p class="chapter-heading">05. A Tryhard in a Whytry World</p>
<div class="intro">
{{ .Content }}
</div>

<div class="newsletter-signup">
  <iframe src="https://hardlimits.substack.com/embed" width="480" height="320" style="border: 1px solid #EEE; background: white" frameborder="0" scrolling="no"></iframe>
</div>

{{ if .Pages }}
<h2>Archive</h2>
<ul class="writing-list">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
    <span class="post-meta">
      <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
    </span>
  </li>
  {{ end }}
</ul>
{{ end }}
{{ end }}
