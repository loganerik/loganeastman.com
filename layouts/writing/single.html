{{ define "main" }}
<a href="/writing/" class="back-link">&larr; Back</a>
<article{{ if eq .Params.postType "poem" }} class="poem"{{ end }}>
  <div class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ with .Params.postType }}<span class="post-type-tag">{{ . }}</span>{{ end }}
      <span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
    </div>
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
<script>
document.querySelectorAll('.post-content img').forEach(function(img) {
  if (!img.closest('a')) {
    var a = document.createElement('a');
    a.href = img.src;
    a.target = '_blank';
    img.parentNode.insertBefore(a, img);
    a.appendChild(img);
  }
});
</script>
{{ end }}
